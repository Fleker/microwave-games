<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Microwave Games">
  <meta name="description" content="Bite-sized games for any spare moment.">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/main.css">

  <title>Microwave Games</title>
</head>
<body>
<div id="app">

  <!-- ════════════════════════════════════════════════════════════
       START SCREEN
       ════════════════════════════════════════════════════════════ -->
  <div id="start-screen" class="screen active">

    <div class="display-panel">
      <div class="brand">MICROWAVE</div>
      <div class="brand-sub">G &nbsp; A &nbsp; M &nbsp; E &nbsp; S</div>
      <div class="tagline">BITE&#x2011;SIZED FUN &nbsp;&bull;&nbsp; ANYWHERE</div>
    </div>

    <div class="controls">
      <p class="prompt">SELECT COOK TIME</p>

      <div class="time-buttons">
        <button class="time-btn" data-seconds="30">30s</button>
        <button class="time-btn" data-seconds="60">1m</button>
        <button class="time-btn" data-seconds="120">2m</button>
        <button class="time-btn" id="custom-btn">CUSTOM</button>
      </div>

      <div id="custom-input" class="custom-input hidden" role="group" aria-label="Custom time">
        <label>
          <span>MIN</span>
          <input type="number" id="custom-min" min="0" max="59" value="1" inputmode="numeric" aria-label="Minutes">
        </label>
        <span class="colon" aria-hidden="true">:</span>
        <label>
          <span>SEC</span>
          <input type="number" id="custom-sec" min="0" max="59" value="30" inputmode="numeric" aria-label="Seconds">
        </label>
        <button id="start-custom-btn" class="time-btn start">GO</button>
      </div>

      <div id="no-games-msg" class="error hidden" role="alert" aria-live="polite"></div>
    </div>

  </div><!-- /start-screen -->


  <!-- ════════════════════════════════════════════════════════════
       LOADING SCREEN
       ════════════════════════════════════════════════════════════ -->
  <div id="loading-screen" class="screen" aria-busy="true">

    <div class="display-panel">
      <div class="brand">MICROWAVE</div>
      <div class="brand-sub">G &nbsp; A &nbsp; M &nbsp; E &nbsp; S</div>
      <div class="loading-text" id="loading-game-name">HEATING UP...</div>
    </div>

    <div class="loading-bar" role="progressbar" aria-label="Loading">
      <div class="loading-fill" id="loading-fill"></div>
    </div>

  </div><!-- /loading-screen -->


  <!-- ════════════════════════════════════════════════════════════
       GAME SCREEN
       ════════════════════════════════════════════════════════════ -->
  <div id="game-screen" class="screen">

    <div class="game-hud">
      <button id="back-btn" class="hud-btn" aria-label="Stop and go home">&#x2190; STOP</button>
      <div id="game-title" class="hud-title" aria-label="Game title"></div>
      <div id="timer-display" class="hud-timer" aria-live="off" aria-label="Time remaining">0:00</div>
    </div>

    <!--
      sandbox: allow-scripts   → game JS runs
               allow-same-origin → window.parent.postMessage works
      All games are local/trusted; adjust if hosting games on a separate origin.
    -->
    <iframe
      id="game-frame"
      src=""
      sandbox="allow-scripts allow-same-origin"
      allow="fullscreen"
      title="Game"
      aria-label="Game content"
    ></iframe>

  </div><!-- /game-screen -->


  <!-- ════════════════════════════════════════════════════════════
       GAME OVER SCREEN
       ════════════════════════════════════════════════════════════ -->
  <div id="gameover-screen" class="screen">

    <div class="display-panel">
      <div class="brand">TIME'S UP!</div>
      <div id="game-over-title" class="brand-sub"></div>
      <div id="final-score" class="display-time" aria-live="polite"></div>
    </div>

    <div class="controls">
      <div class="time-buttons">
        <button class="time-btn" id="play-again-btn">AGAIN</button>
        <button class="time-btn" id="home-btn">HOME</button>
      </div>
    </div>

  </div><!-- /gameover-screen -->

</div><!-- /app -->

<script src="js/game-registry.js"></script>
<script src="js/app.js"></script>
<script>
  // Register service worker for offline-first caching
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
